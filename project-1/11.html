<!DOCTYPE html>
<html lang="en">
<head>
  <title>SKYLODGE Menu</title>

  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      font-family: "Comic Neue", sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    .menu {
      width: 420px;
      margin: 50px auto;
    }

       h1 {
      font-family: "Lobster", cursive;
      font-size: 30px;
      text-align: center;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }

    h3 {
      font-family: "Lobster", cursive;
      font-size: 50px;
      text-align: center;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }
  
    .menu-line {
      display: flex;
      align-items: center;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 26px;
    }

    .menu-line .label {
      font-weight: 700;
    }

    .menu-line .rule {
      flex: 1;
      height: 1px;
      background: #fff;
      opacity: 0.4;
      margin: 0 100 px;
    }

    .menu-line .price {
      font-weight: 700;
    }

  
    h2 {
      font-style: bold;
      text-align: center;
      font-size: 19px;
      margin: 22px 0 4 px;
      opacity: 0.9;
    }

  
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.05em;
    }

    li span:first-child {
      text-transform: uppercase;
      font-weight: 700;
    }

    li span:last-child {
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="menu">

      <h3>SKYLODGE</h3>
       <h2>POWDER MOUNTAIN UTAH</h2>



    <h1>Peckish</h1>
    <ul>
      <li><span>Peach and Basil</span><span>12</span></li>
      <li><span>Beet and Goat Cheese</span><span>8</span></li>
      <li><span>Caprese Skewers</span><span>6</span></li>
    </ul>

    <h1>Hungry</h1>
    <ul>
      <li><span>Chicken Strips</span><span>14</span></li>
      <li><span>Elk Sliders</span><span>18</span></li>
      <li><span>Grilled Eggplant</span><span>24</span></li>
    </ul>


    <h1>Thirsty</h2>
    <ul>
      <li><span>Mountain Old Fashioned</span><span>11</span></li>
      <li><span>Grasshopper</span><span>9</span></li>
      <li><span>Sky Toddy</span><span>12</span></li>
    </ul>
    
  </div>
</body>
</html>
