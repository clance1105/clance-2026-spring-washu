/* ---- USED CHATGPT FOR HELP -- ADDED: DRAMATIC scroll reveal ---- */
:root{
  --dur: 1100ms;
  --ease: cubic-bezier(.16, 1, .3, 1);
}

.reveal{
  opacity:0;
  transform: translateY(52px) scale(0.985);
  filter: blur(10px);
  transition:
    opacity var(--dur) var(--ease),
    transform var(--dur) var(--ease),
    filter var(--dur) var(--ease);
  will-change: opacity, transform, filter;
}

.reveal.in-view{
  opacity:1;
  transform: translateY(0) scale(1);
  filter: blur(0px);
}

/* extra drama for images */
.reveal.img{
  transform: translateY(64px) scale(0.94);
}
.reveal.img.in-view{
  transform: translateY(0) scale(1);
}

/* stagger support (set via JS inline style) */
.reveal{ transition-delay: var(--delay, 0ms); }

@media (prefers-reduced-motion: reduce){
  .reveal{
    opacity:1;
    transform:none;
    filter:none;
    transition:none;
  }
}

  <!-- ANIMATION MADE USING CHAT HELP-->

  <script>
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const baseStagger = 120;   // ms between elements
  const liStagger   = 90;    // ms between list items

  const revealEls = Array.from(document.querySelectorAll('.reveal'));

  // choreographed delays
  revealEls.forEach((el, i) => {
    el.style.setProperty('--delay', `${i * baseStagger}ms`);
  });

  // cascade list items (each time UL enters view)
  document.querySelectorAll('ul.reveal').forEach(ul => {
    ul.querySelectorAll('li').forEach((li, idx) => {
      li.classList.add('reveal');
      li.style.setProperty('--delay', `${(idx + 1) * liStagger}ms`);
    });
  });

  if (!prefersReduced) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const el = entry.target;

        if (entry.isIntersecting) {
          // entering viewport: animate in
          el.classList.add('in-view');

          // if it's a UL, animate its LIs too
          if (el.tagName === 'UL') {
            el.querySelectorAll('li.reveal').forEach(li => li.classList.add('in-view'));
          }
        } else {
          // leaving viewport: reset so it can replay next time
          el.classList.remove('in-view');

          if (el.tagName === 'UL') {
            el.querySelectorAll('li.reveal').forEach(li => li.classList.remove('in-view'));
          }
        }
      });
    }, {
      threshold: 0.35,
      rootMargin: "0px 0px -10% 0px"
    });

    // Observe only top-level reveals (not the li’s; those are controlled by their UL)
    revealEls.forEach(el => {
      if (el.tagName !== 'LI') io.observe(el);
    });

  } else {
    // reduced motion: always visible
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in-view'));
  }

// HAPPY HOUR (5–9pm Mountain Time)
// swaps background + hero image
// ------------------------------
(function () {
  const happySrc =
    "https://www.powder.com/.image/c_fill,w_1200,h_1200,g_xy_center,x_2520,y_1948/MjA3ODk2OTYzMTc2MjEyMjI5/gettyimages-475104837.jpg";

  function getMountainHour() {
    // returns "00".."23" reliably
    const hh = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/Denver",
      hour: "2-digit",
      hour12: false,
    }).format(new Date());
    return parseInt(hh, 10);
  }

  function updateHappyHour() {
    try {
      const hour = getMountainHour();
      const isHappyHour = hour >= 17 && hour < 21;

      document.body.classList.toggle("happy-hour", isHappyHour);

      const img = document.getElementById("topHero");
      if (img) {
        // store the original once, automatically
        if (!img.dataset.defaultSrc) img.dataset.defaultSrc = img.src;

        img.src = isHappyHour ? happySrc : img.dataset.defaultSrc;
      }
    } catch (e) {
      console.error("Happy hour script error:", e);
    }
  }

  // run once after DOM is ready (extra safe)
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", updateHappyHour);
  } else {
    updateHappyHour();
  }

  // keep checking
  setInterval(updateHappyHour, 30 * 1000);
})();
