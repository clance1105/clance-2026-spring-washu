<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f4f7ff;
      background: radial-gradient(circle at top, #1b1f4a 0%, #090b1a 45%, #03030a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .stars {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20px 30px, white, transparent),
        radial-gradient(1.5px 1.5px at 100px 80px, #cce6ff, transparent),
        radial-gradient(2px 2px at 200px 150px, white, transparent),
        radial-gradient(1.5px 1.5px at 300px 40px, #d6f0ff, transparent),
        radial-gradient(2px 2px at 400px 120px, white, transparent),
        radial-gradient(1.5px 1.5px at 500px 200px, #bcdcff, transparent),
        radial-gradient(2px 2px at 650px 90px, white, transparent),
        radial-gradient(1.5px 1.5px at 800px 160px, #d9f3ff, transparent);
      background-repeat: repeat;
      background-size: 900px 300px;
      opacity: 0.8;
      animation: twinkle 6s linear infinite;
      z-index: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .container {
      width: 90%;
      max-width: 600px;
      padding: 35px;
      background: rgba(10, 15, 40, 0.75);
      border: 1px solid rgba(173, 216, 255, 0.2);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(120, 170, 255, 0.15);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 2.5rem;
      color: #c9d9ff;
      text-shadow: 0 0 10px rgba(170, 210, 255, 0.5);
      margin-bottom: 25px;
    }

    details {
      margin: 18px 0;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(143, 227, 255, 0.2);
    }

    summary {
      cursor: pointer;
      font-size: 1.2rem;
      color: #9fd3ff;
      font-weight: bold;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: " +";
      color: #8fe3ff;
    }

    details[open] summary::after {
      content: " −";
    }

    ul {
      list-style-type: none;
      padding-left: 0;
      margin-top: 15px;
    }

    li {
      margin: 10px 0;
    }

    a {
      color: #8fe3ff;
      text-decoration: none;
      transition: 0.3s;
      font-size: 1rem;
    }

    a:hover {
      color: white;
      text-shadow: 0 0 8px #8fe3ff;
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="container">
    <h1>SKYLODGE</h1>

    <details>
      <summary>Markdown</summary>
      <ul>
        <li><a href="01.md">01</a></li>
        <li><a href="02.md">02</a></li>
        <li><a href="03.md">03</a></li>
        <li><a href="04.md">04</a></li>
        <li><a href="05.md">05</a></li>
      </ul>
    </details>

    <details>
      <summary>HTML</summary>
      <ul>
        <li><a href="06.html">06</a></li>
        <li><a href="07.html">07</a></li>
        <li><a href="08.html">08</a></li>
        <li><a href="09.html">09</a></li>
        <li><a href="10.html">10</a></li>
        <li><a href="11.html">11</a></li>
        <li><a href="12.html">12</a></li>
        <li><a href="13.html">13</a></li>
        <li><a href="14.html">14</a></li>
        <li><a href="15.html">15</a></li>
        <li><a href="16.html">16</a></li>
        <li><a href="17.html">17</a></li>
        <li><a href="18.html">18</a></li>
        <li><a href="19.html">19</a></li>
      </ul>
    </details>

    <details>
      <summary>Final Variation</summary>
      <ul>
        <li><a href="20.html">20</a></li>
      </ul>
    </details>
  </div>
</body>
</html>
